<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="url(#grad)"/>
  <!-- Network nodes and connections representing kernel-bypass speed -->
  <!-- Central node -->
  <circle cx="100" cy="100" r="18" fill="#fff" opacity="0.95"/>
  <!-- Top-left node -->
  <circle cx="52" cy="52" r="12" fill="#fff" opacity="0.8"/>
  <!-- Top-right node -->
  <circle cx="148" cy="52" r="12" fill="#fff" opacity="0.8"/>
  <!-- Bottom-left node -->
  <circle cx="52" cy="148" r="12" fill="#fff" opacity="0.8"/>
  <!-- Bottom-right node -->
  <circle cx="148" cy="148" r="12" fill="#fff" opacity="0.8"/>
  <!-- Connection lines -->
  <line x1="64" y1="60" x2="86" y2="88" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="136" y1="60" x2="114" y2="88" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="64" y1="140" x2="86" y2="112" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="136" y1="140" x2="114" y2="112" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Cross connections for mesh network feel -->
  <line x1="64" y1="52" x2="136" y2="52" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="64" y1="148" x2="136" y2="148" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="52" y1="64" x2="52" y2="136" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="148" y1="64" x2="148" y2="136" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Lightning bolt in center node for speed -->
  <path d="M104 90 L96 101 L103 101 L96 112 L106 99 L99 99 Z" fill="url(#grad)" stroke="none"/>
</svg>
